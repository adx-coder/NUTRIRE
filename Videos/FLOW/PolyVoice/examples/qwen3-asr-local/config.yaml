runtime:
  host: 127.0.0.1
  port: 8092
  log_level: info

stt:
  provider: asr-sdk
  model: qwen3
  params:
    model_name: qwen3
    sample_rate: 16000
    legacy_backend: qwen3
    sdk_config:
      models:
        - model_loader: qwen3
          name: qwen3
          backend: qwen3
          model_name: Qwen/Qwen3-ASR-0.6B
          device: cuda
          sample_rate: 16000
          chunk_size_sec: 0.032
          max_buffer_sec: 60.0
          overlap_sec: 0.09
          cache_aware_streaming: true
          final_padding_sec: 0.08
          asr_window_sec: 1.0
          asr_stride_sec: 0.5
          asr_throttle_sec: 0.2
          gpu_memory_utilization: 0.08
          max_model_len: 4096
          max_inference_batch_size: 32
          max_new_tokens: 256
          enable_forced_aligner: false
          forced_aligner_model: Qwen/Qwen3-ForcedAligner-0.6B
          enable_punctuation: true
          enable_agc: true
          enable_vad: true
          enable_volume_barge_in: true
          use_smart_turn_endpointing: true
          reproducible: true
          seed: 42
      vad:
        provider: silero
        backend: silero
        threshold: 0.45
        onset_frames: 2
        offset_frames: 8
        hangover_frames: 15
        pre_roll_chunks: 15
      processing:
        min_finalization_confidence: 0.50
        min_partial_confidence: 0.40
        enable_punctuation: true
        enable_agc: true
        use_smart_turn_endpointing: true

llm:
  provider: mock
  model: mock

tts:
  provider: mock
  model: mock
